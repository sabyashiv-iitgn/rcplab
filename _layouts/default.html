<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="{{ site.logo_mark | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
    <div class="page">
      {% include header.html %}

      <main class="content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p><strong>RCP Lab</strong><span>Department of Cognitive and Brain Sciences · IIT Gandhinagar</span></p>
      </footer>
    </div>
    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
