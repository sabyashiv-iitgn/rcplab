<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RCP Lab — Intro with Voice-over</title>
<style>
  :root{
    --blue:#4a90d9;   /* perception */
    --green:#5fae3f;  /* planning */
    --red:#d93025;    /* learning */
    --dark:#4a4a4a;   /* POMDP */
    --purpleFill:#dcc8e6; /* contextual inference */
    --purpleDeep:#8e5fae;
    --brown:#a07840;  /* hexagon border */
    --ink:#22242a;
    --bg:#faf9f6;
    --muted:#8a8f99;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#e9e7e2;font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;color:var(--ink)}
  body{display:flex;align-items:center;justify-content:center;padding:16px}
  #app{width:min(96vw,1120px)}
  #stage-wrap{position:relative;width:100%;aspect-ratio:16/8;background:var(--bg);border-radius:0 0 14px 14px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.18)}
  #stage{position:absolute;inset:0}
  .scene{position:absolute;inset:0;opacity:0;visibility:hidden;transition:opacity .5s;background:var(--bg)}
  .scene.active{opacity:1;visibility:visible}
  .scene svg{width:100%;height:100%;display:block}
  #stage.paused *{animation-play-state:paused !important}

  /* ---------- caption bar (above the video so no text is ever hidden) ---------- */
  #caption{
    min-height:78px;border-radius:14px 14px 0 0;border-bottom:2px solid #eceae4;
    display:flex;align-items:center;justify-content:center;text-align:center;
    padding:12px 40px;font-size:clamp(14px,2vw,21px);line-height:1.35;font-weight:500;
    background:var(--bg);color:var(--ink);box-shadow:0 10px 40px rgba(0,0,0,.18)
  }
  #caption span{opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s;display:inline-block}
  #caption span.show{opacity:1;transform:none}
  #caption b.p{color:var(--blue)} #caption b.l{color:var(--red)}
  #caption b.pl{color:var(--green)} #caption b.c{color:var(--purpleDeep)} #caption b.r{color:var(--brown)}

  /* ---------- controls ---------- */
  #controls{display:flex;align-items:center;gap:12px;margin-top:12px}
  button{cursor:pointer;border:none;border-radius:8px;background:#3a3d45;color:#fff;font-size:14px;padding:9px 16px;font-family:inherit}
  button:hover{background:#54586233}
  button:hover{background:#565a66}
  #bar{flex:1;position:relative;height:26px;cursor:pointer}
  #bar .track{position:absolute;top:11px;left:0;right:0;height:4px;background:#d5d2ca;border-radius:2px}
  #bar .fill{position:absolute;top:11px;left:0;height:4px;background:var(--purpleDeep);border-radius:2px;width:0%}
  #bar .mark{position:absolute;top:7px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid #b6b2a8;transform:translateX(-50%)}
  #bar .mark.done{border-color:var(--purpleDeep);background:var(--purpleDeep)}
  #bar .mark:hover{border-color:var(--ink)}
  #clockTxt{font-variant-numeric:tabular-nums;font-size:13px;color:#555;min-width:86px;text-align:right}
  #sceneName{font-size:12px;color:var(--muted);margin-top:6px;text-align:center;letter-spacing:.08em;text-transform:uppercase}
  audio{display:none}
  body.export{padding:0;background:var(--bg);overflow:hidden}
  body.export #app{width:1280px;height:720px}
  body.export #caption{height:80px;min-height:80px;border-radius:0;box-shadow:none;font-size:24px}
  body.export #stage-wrap{width:1280px;height:640px;aspect-ratio:auto;border-radius:0;box-shadow:none}
  body.export #controls,body.export #sceneName{display:none}

  /* ---------- shared svg bits ---------- */
  text{font-family:inherit}
  .chip{font-weight:700;letter-spacing:.14em;font-size:22px}
  .chipSm{font-size:18px;letter-spacing:.1em}
  .fade-in{opacity:0;animation:fadeIn .8s forwards}
  @keyframes fadeIn{to{opacity:1}}
  @keyframes fadeInHalf{to{opacity:.55}}
  @keyframes riseIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
  @keyframes dashDraw{to{stroke-dashoffset:0}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  /* ============ S1 title ============ */
  .s1 .hex{stroke-dasharray:900;stroke-dashoffset:900}
  .active.s1 .hex{animation:dashDraw 2.2s .3s ease forwards}
  .active.s1 .t1{animation:riseIn 1s .8s forwards}
  .active.s1 .t2{animation:riseIn 1s 1.6s forwards}
  .active.s1 .t3{animation:riseIn 1s 2.4s forwards}
  .s1 .t1,.s1 .t2,.s1 .t3{opacity:0}

  /* ============ S2 airport ============ */
  .s2 .plane{opacity:0}
  .active.s2 .plane{animation:planeFly 5s .3s ease-in-out forwards}
  @keyframes planeFly{0%{opacity:0;transform:translate(-140px,40px)}15%{opacity:1}100%{opacity:1;transform:translate(760px,-30px)}}
  .s2 .corridor,.s2 .walker,.s2 .gateGrp,.s2 .qmark{opacity:0}
  .active.s2 .corridor{animation:fadeIn 1s 1.2s forwards}
  .active.s2 .walker{animation:fadeIn .8s 2s forwards, walkIn 4.5s 2.8s ease-in-out forwards}
  @keyframes walkIn{from{transform:translateX(0)}to{transform:translateX(260px)}}
  .active.s2 .gateGrp{animation:riseIn .8s 3s forwards}
  .active.s2 .qmark{animation:fadeIn .6s 7.6s forwards, blink 2.4s 8.2s infinite}
  .s2 .crowd{opacity:0}
  .active.s2 .crowd{animation:fadeInHalf 1s 3.2s forwards}
  .active.s2 .cd1{animation:drift1 7s 3s linear infinite}
  .active.s2 .cd2{animation:drift2 8s 3s linear infinite}
  .active.s2 .cd3{animation:drift3 6.5s 3s linear infinite}
  @keyframes drift1{from{transform:translate(0,0)}to{transform:translate(170px,0)}}
  @keyframes drift2{from{transform:translate(0,0)}to{transform:translate(200px,0)}}
  @keyframes drift3{from{transform:translate(0,0)}to{transform:translate(150px,0)}}

  /* ============ S3 perception ============ */
  .s3 .chipG,.s3 .cone,.s3 .sign1,.s3 .sign2,.s3 .arrows,.s3 .beliefTxt,.s3 .youGrp,.s3 .crowd{opacity:0}
  .active.s3 .chipG{animation:riseIn .7s .2s forwards}
  .active.s3 .youGrp{animation:fadeIn .6s .2s forwards}
  .active.s3 .crowd{animation:fadeInHalf .6s .2s forwards}
  .active.s3 .cd1{animation:drift1 7s .2s linear infinite}
  .active.s3 .cd2{animation:drift2 8s .2s linear infinite}
  .active.s3 .cd3{animation:drift3 6.5s .2s linear infinite}
  .active.s3 .cone{animation:fadeIn 1s 1s forwards}
  .active.s3 .coneRot{animation:sweep 5s 1.4s ease-in-out infinite alternate;transform-origin:245px 320px}
  @keyframes sweep{from{transform:rotate(-14deg)}to{transform:rotate(14deg)}}
  .active.s3 .sign1{animation:unblur 1.4s 2.2s forwards}
  .active.s3 .sign2{animation:unblur 1.4s 3.4s forwards}
  @keyframes unblur{0%{opacity:0;filter:blur(6px)}40%{opacity:1;filter:blur(5px)}100%{opacity:1;filter:blur(0)}}
  .active.s3 .arrows{animation:fadeInHalf 1s 4.5s forwards}
  .active.s3 .beliefTxt{animation:riseIn .8s 8s forwards}
  .active.s3 .dotP{animation:pulse 1.6s 1s infinite;transform-origin:center;transform-box:fill-box}

  /* ============ S4 learning ============ */
  .s4 .chipG,.s4 .personG,.s4 .mapG,.s4 .badPath,.s4 .cross,.s4 .goodPath,.s4 .updTxt,.s4 .memTxt{opacity:0}
  .active.s4 .chipG{animation:riseIn .7s .2s forwards}
  .active.s4 .personG{animation:fadeIn .8s .6s forwards}
  .active.s4 .mapG{animation:fadeIn 1s 1.2s forwards}
  .s4 .badPath{stroke-dasharray:420;stroke-dashoffset:420}
  .active.s4 .badPath{animation:fadeIn .1s 1.5s forwards, dashDraw 2s 1.5s ease forwards}
  .active.s4 .cross{animation:fadeIn .5s 3.8s forwards}
  .s4 .goodPath{stroke-dasharray:430;stroke-dashoffset:430}
  .active.s4 .goodPath{animation:fadeIn .1s 6s forwards, dashDraw 2.2s 6s ease forwards, thicken 3s 8.5s forwards}
  @keyframes thicken{to{stroke-width:9;opacity:1}}
  .active.s4 .updTxt{animation:fadeIn .6s 9.2s forwards, blink 2s 9.8s 2}
  .active.s4 .memTxt{animation:riseIn .8s 11s forwards}
  .s4 .nextTxt{opacity:0}
  .active.s4 .nextTxt{animation:riseIn .8s 15s forwards}
  .active.s4 .dotL{animation:pulse 1.6s 1s infinite;transform-origin:center;transform-box:fill-box}

  /* ============ S5 planning ============ */
  .s5 .chipG,.s5 .treeG,.s5 .bestG,.s5 .planTxt{opacity:0}
  .active.s5 .chipG{animation:riseIn .7s .2s forwards}
  .active.s5 .treeG{animation:fadeIn 1.2s .9s forwards}
  .s5 .bestG path{stroke-dasharray:600;stroke-dashoffset:600}
  .active.s5 .bestG{animation:fadeIn .1s 10s forwards}
  .active.s5 .bestG path{animation:dashDraw 2.6s 10s ease forwards}
  .active.s5 .planTxt{animation:riseIn .8s 13s forwards}
  .active.s5 .dotPl{animation:pulse 1.6s 1s infinite;transform-origin:center;transform-box:fill-box}

  /* ============ S6 pomdp ============ */
  .s6 .lblP,.s6 .lblL,.s6 .lblPl,.s6 .pomdpCircle,.s6 .pomdpTxt,.s6 .pomdpSub,.s6 .aw,.s6 .rimLbl,.s6 .rim{opacity:0}
  .active.s6 .rimP{animation:fadeIn .6s 3.2s forwards}
  .active.s6 .rimPl{animation:fadeIn .6s 8.2s forwards}
  .active.s6 .rimL{animation:fadeIn .6s 12.7s forwards}
  .active.s6 .pomdpCircle{animation:growIn 1.2s .4s cubic-bezier(.2,.9,.3,1.2) forwards;transform-origin:480px 250px}
  @keyframes growIn{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:scale(1)}}
  /* dots land exactly on the circle rim in order: perception → planning → learning */
  .active.s6 .lblP{animation:fadeIn .5s 2.6s forwards}
  .active.s6 .flyP{animation:flyP 1.5s 3.2s ease-in-out forwards}
  .active.s6 .flyP text{animation:fadeOut .7s 3.7s forwards}
  .active.s6 .flyP .mini{animation:fadeOut .7s 4.5s forwards}
  .active.s6 .flyP circle:not(.mini){animation:pulse .9s 4.8s;transform-origin:center;transform-box:fill-box}
  .active.s6 .rl1{animation:fadeIn .6s 3.2s forwards}
  .active.s6 .lblPl{animation:fadeIn .5s 7.6s forwards}
  .active.s6 .flyPl{animation:flyPl 1.5s 8.2s ease-in-out forwards}
  .active.s6 .flyPl text{animation:fadeOut .7s 8.7s forwards}
  .active.s6 .flyPl .mini{animation:fadeOut .7s 9.5s forwards}
  .active.s6 .flyPl circle:not(.mini){animation:pulse .9s 9.8s;transform-origin:center;transform-box:fill-box}
  .active.s6 .rl3{animation:fadeIn .6s 8.2s forwards}
  .active.s6 .lblL{animation:fadeIn .5s 12.1s forwards}
  .active.s6 .flyL{animation:flyL 1.5s 12.7s ease-in-out forwards}
  .active.s6 .flyL text{animation:fadeOut .7s 13.2s forwards}
  .active.s6 .flyL .mini{animation:fadeOut .7s 14s forwards}
  .active.s6 .flyL circle:not(.mini){animation:pulse .9s 14.3s;transform-origin:center;transform-box:fill-box}
  .active.s6 .rl2{animation:fadeIn .6s 12.7s forwards}
  @keyframes flyP{to{transform:translate(330px,48px)}}
  @keyframes flyL{to{transform:translate(-382px,136px)}}
  @keyframes flyPl{to{transform:translate(32px,-118px)}}
  .active.s6 .pomdpTxt{animation:riseIn .9s 16.3s forwards}
  .active.s6 .a1{animation:fadeIn .4s 17s forwards}
  .active.s6 .a2{animation:fadeIn .4s 17.5s forwards}
  .active.s6 .a3{animation:fadeIn .4s 18s forwards}
  .active.s6 .a4{animation:fadeIn .4s 18.5s forwards}
  .active.s6 .a5{animation:fadeIn .4s 19s forwards}
  .active.s6 .pomdpSub{animation:riseIn .9s 19.6s forwards}

  /* ============ S7 context ============ */
  .s7 .ctx1,.s7 .ctx2,.s7 .ctx3,.s7 .bigCircle,.s7 .ctxTxt{opacity:0}
  .active.s7 .ctx1{animation:growIn2 .9s .3s forwards;transform-origin:345px 180px}
  .active.s7 .ctx2{animation:growIn2 .9s 1.2s forwards;transform-origin:440px 310px}
  .active.s7 .ctx3{animation:growIn2 .9s 2.1s forwards;transform-origin:540px 180px}
  @keyframes growIn2{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
  .s7 .bigCircle circle{stroke-dasharray:1600;stroke-dashoffset:1600}
  .active.s7 .bigCircle{animation:fadeIn .2s 3.6s forwards}
  .active.s7 .bigCircle circle{animation:dashDraw 2.4s 3.6s ease forwards}
  .active.s7 .bigFill{animation:fadeInHalf 1.5s 5s forwards}
  .active.s7 .ctxTxt{animation:riseIn .9s 6.2s forwards}

  /* ============ S8 resource rationality ============ */
  .s8 .chipG,.s8 .rrTxt,.s8 .mG,.s8 .mLbl,.s8 .mLblBig{opacity:0}
  .active.s8 .chipG{animation:riseIn .7s .2s forwards}
  .active.s8 .mBig{animation:fadeIn .8s .4s forwards}
  .active.s8 .m1{animation:fadeIn .8s .7s forwards}
  .active.s8 .m3{animation:fadeIn .8s .9s forwards}
  .active.s8 .m2{animation:fadeIn .8s 1.1s forwards}
  .active.s8 .m1 .mLbl{animation:fadeIn .8s 6s forwards}
  .active.s8 .m3 .mLbl{animation:fadeIn .8s 12s forwards}
  .active.s8 .m2 .mLbl{animation:fadeIn .8s 16.5s forwards}
  .active.s8 .mLblBig{animation:fadeIn .8s 22.3s forwards}
  @keyframes fadeOut{to{opacity:0}}
  .active.s8 .rrTxt{animation:riseIn .9s 25s forwards}
  /* morph keyframes (circle → polygon) are generated by JS and injected as a <style> */

  /* ============ S9 logo ============ */
  .s9 .logoG{opacity:0}
  .active.s9 .logoG{animation:growIn3 1.4s .3s cubic-bezier(.2,.9,.3,1.15) forwards;transform-origin:330px 265px}
  @keyframes growIn3{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .s9 .lt1,.s9 .lt2,.s9 .lt3,.s9 .lt3b{opacity:0}
  .active.s9 .lt1{animation:riseIn .9s 4s forwards}
  .active.s9 .lt2{animation:riseIn .9s 4.8s forwards}
  .active.s9 .lt3{animation:riseIn .9s 8.5s forwards}
  .active.s9 .lt3b{animation:riseIn .9s 8.5s forwards}

  /* ============ S10 join us ============ */
  .s10 .tG,.s10 .bG,.s10 .aT,.s10 .aB,.s10 .lG,.s10 .oA,.s10 .oB,.s10 .oC,.s10 .card,.s10 .j7{opacity:0}
  .s10 .arr{stroke-dasharray:220;stroke-dashoffset:220}
  .s10 .ah{opacity:0}
  .active.s10 .tG{animation:riseIn .7s .3s forwards}
  .active.s10 .aT{animation:fadeIn .2s 1.1s forwards}
  .active.s10 .aT .arr{animation:dashDraw 1s 1.1s ease-out forwards}
  .active.s10 .aT .ah{animation:fadeIn .25s 2.1s forwards}
  .active.s10 .lG{animation:growIn 1s 1.8s cubic-bezier(.2,.9,.3,1.2) forwards;transform-origin:480px 196px}
  .active.s10 .bG{animation:riseIn .7s 4.5s forwards}
  .active.s10 .aB{animation:fadeIn .2s 5.2s forwards}
  .active.s10 .aB .arr{animation:dashDraw 1s 5.2s ease-out forwards}
  .active.s10 .aB .ah{animation:fadeIn .25s 6.2s forwards}
  .active.s10 .oA{animation:fadeIn .2s 8.7s forwards}
  .active.s10 .oA .arr{animation:dashDraw .9s 8.7s ease-out forwards}
  .active.s10 .oA .ah{animation:fadeIn .25s 9.6s forwards}
  .active.s10 .cardA{animation:riseIn .8s 9.7s forwards}
  .active.s10 .oB{animation:fadeIn .2s 13.7s forwards}
  .active.s10 .oB .arr{animation:dashDraw .9s 13.7s ease-out forwards}
  .active.s10 .oB .ah{animation:fadeIn .25s 14.6s forwards}
  .active.s10 .cardB{animation:riseIn .8s 14.7s forwards}
  .active.s10 .oC{animation:fadeIn .2s 18.2s forwards}
  .active.s10 .oC .arr{animation:dashDraw .9s 18.2s ease-out forwards}
  .active.s10 .oC .ah{animation:fadeIn .25s 19.1s forwards}
  .active.s10 .cardC{animation:riseIn .8s 19.2s forwards}
  .active.s10 .j7{animation:growIn 1s 22.8s cubic-bezier(.2,.9,.3,1.2) forwards;transform-origin:480px 435px}
</style>
</head>
<body>
<div id="app">
  <audio id="voiceover" preload="auto" src="narration.m4a"></audio>
  <div id="caption"><span id="capText"></span></div>
  <div id="stage-wrap">
    <div id="stage"></div>
  </div>
  <div id="controls">
    <button id="playBtn">▶ Play</button>
    <button id="restartBtn">⟲ Restart</button>
    <div id="bar"><div class="track"></div><div class="fill"></div></div>
    <div id="clockTxt">0:00 / 0:00</div>
  </div>
  <div id="sceneName"></div>
</div>

<script>
"use strict";
/* ---------- helpers ---------- */
function poly(sides,cx,cy,r,rot=-90){
  const pts=[];
  for(let i=0;i<sides;i++){
    const a=(rot+i*360/sides)*Math.PI/180;
    pts.push((cx+r*Math.cos(a)).toFixed(1)+","+(cy+r*Math.sin(a)).toFixed(1));
  }
  return pts.join(" ");
}
function dotsAt(cx,cy,r,n,dr=6){ // dots sit exactly on polygon vertices (or circumference for circles)
  const angs = n ? [0,Math.round(n/3),Math.round(2*n/3)].map(i=>-90+i*360/n) : [-90,30,150];
  const cols=["var(--blue)","var(--green)","var(--red)"];
  return angs.map((a,k)=>{const t=a*Math.PI/180;
    return `<circle cx="${(cx+r*Math.cos(t)).toFixed(1)}" cy="${(cy+r*Math.sin(t)).toFixed(1)}" r="${dr}" fill="${cols[k]}"/>`;}).join("");
}
function miniPomdp(cx,cy,r,shape,dr=6){ // dark circle or polygon with 3 vertex-aligned dots
  const body = shape ? `<polygon points="${poly(shape,cx,cy,r)}" fill="var(--dark)"/>`
                     : `<circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--dark)"/>`;
  return body+dotsAt(cx,cy,r,shape||0,dr);
}
function shapePts(n,cx,cy,r,rot=-90,S=210){ // path with S points: circle (n=0) or n-gon, same command count => morphable
  const pts=[];
  if(!n){
    for(let i=0;i<S;i++){const a=(rot+i*360/S)*Math.PI/180;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  }else{
    const vs=[];
    for(let i=0;i<=n;i++){const a=(rot+i*360/n)*Math.PI/180;vs.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
    const per=S/n;
    for(let e=0;e<n;e++)for(let k=0;k<per;k++){const t=k/per;
      pts.push([vs[e][0]+(vs[e+1][0]-vs[e][0])*t, vs[e][1]+(vs[e+1][1]-vs[e][1])*t]);}
  }
  return "M"+pts.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join("L")+"Z";
}
function dotAngles(n){return n?[0,Math.round(n/3),Math.round(2*n/3)].map(i=>-90+i*360/n):[-90,30,150];}
function morphDots(cx,cy,r){ // dots at circle positions, classes md0..md2 so they can slide to vertices
  const cols=["var(--blue)","var(--green)","var(--red)"];
  return dotAngles(0).map((a,k)=>{const t=a*Math.PI/180;
    return `<circle class="md${k}" cx="${(cx+r*Math.cos(t)).toFixed(1)}" cy="${(cy+r*Math.sin(t)).toFixed(1)}" r="6" fill="${cols[k]}"/>`;}).join("");
}
function arrowHead(x,y,ang){ // small triangle pointing along ang (deg)
  const a=ang*Math.PI/180, c=Math.cos(a), s=Math.sin(a);
  const p=(dx,dy)=>(x+dx*c-dy*s).toFixed(1)+","+(y+dx*s+dy*c).toFixed(1);
  return `<polygon points="${p(0,0)} ${p(-14,-6.5)} ${p(-14,6.5)}" fill="#555"/>`;
}
function pie(cx,cy,r,frac,color){ // time-remaining pie
  const a=(-90+frac*360)*Math.PI/180, large=frac>0.5?1:0;
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#f2f0ea" stroke="#8a8f99" stroke-width="1.5"/>
    <path d="M${cx} ${cy} L${cx} ${cy-r} A${r} ${r} 0 ${large} 1 ${(cx+r*Math.cos(a)).toFixed(1)} ${(cy+r*Math.sin(a)).toFixed(1)} Z" fill="${color}"/>`;
}
function person(x,y,s,color="var(--dark)"){ // simple stick figure, feet at (x,y)
  return `<g transform="translate(${x},${y}) scale(${s})">
    <circle cx="0" cy="-52" r="9" fill="${color}"/>
    <path d="M0 -42 L0 -14 M0 -14 L-9 8 M0 -14 L9 8 M0 -36 L-12 -22 M0 -36 L13 -24"
      stroke="${color}" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>`;
}

/* ---------- scene svg markup ---------- */
const VB='viewBox="0 0 960 470"'; /* bottom ~70px reserved for captions */

const S1=`<svg ${VB}>
  <polygon class="hex" points="${poly(6,480,225,120,0)}" fill="none" stroke="var(--brown)" stroke-width="5"/>
  <polygon points="${poly(6,480,225,114,0)}" fill="var(--purpleFill)" opacity=".35"/>
  <g>${miniPomdp(490,160,20,3)}${miniPomdp(414,228,25,5)}${miniPomdp(523,272,27,7)}</g>
  <text class="t1" x="480" y="392" text-anchor="middle" font-size="42" font-weight="700">RCP Lab</text>
  <text class="t2" x="480" y="424" text-anchor="middle" font-size="17" fill="#555">Resource-rational Context-dependent POMDP Lab</text>
  <text class="t3" x="480" y="450" text-anchor="middle" font-size="14" fill="var(--muted)">Department of Cognitive and Brain Sciences · IIT Gandhinagar</text>
</svg>`;

    const target=shapePts(m.n,m.cx,m.cy,m.r,m.rot);
    const extra=m.stroke?`;stroke:${m.stroke};stroke-width:${m.sw}`:"";
    css+=`@keyframes morph_${m.cls}{to{d:path("${target}")${extra}}}\n`;
    css+=`.active.s8 .${m.cls} .mBody{animation:morph_${m.cls} 1.8s ${m.delay}s ease-in-out forwards}\n`;
    if(m.cls!=="mBig"){
      const from=dotAngles(0), to=dotAngles(m.n);
      for(let k=0;k<3;k++){
        const a1=from[k]*Math.PI/180, a2=to[k]*Math.PI/180;
        const dx=(m.r*(Math.cos(a2)-Math.cos(a1))).toFixed(1),
              dy=(m.r*(Math.sin(a2)-Math.sin(a1))).toFixed(1);

        css+=`.active.s8 .${m.cls} .md${k}{animation:dmv_${m.cls}_${k} 1.8s ${m.delay}s ease-in-out forwards}\n`;
      }
    }
  });
  const st=document.createElement("style"); st.textContent=css; document.head.appendChild(st);
})();

/* ---------- playback engine ---------- */
const capText=document.getElementById("capText"),
      clockTxt=document.getElementById("clockTxt"),
      sceneName=document.getElementById("sceneName"),
      playBtn=document.getElementById("playBtn"),
      voiceover=document.getElementById("voiceover");
let t=0, playing=false, raf=null, last=null, curScene=-1, curCap=null;
const params=new URLSearchParams(location.search), exportMode=params.get("export")==="1";
if(exportMode) document.body.classList.add("export");

function fmt(x){const m=Math.floor(x/60),s=Math.floor(x%60);return m+":"+String(s).padStart(2,"0");}

function activateScene(i,force){
  if(i===curScene && !force) return;
  document.querySelectorAll(".scene.active").forEach(el=>el.classList.remove("active"));
  const el=document.getElementById("sc_"+SCENES[i].id);
  // restart CSS animations
  el.classList.remove("active"); void el.offsetWidth; el.classList.add("active");
  curScene=i; curCap=null; capText.classList.remove("show");
  sceneName.textContent=(i+1)+" / "+SCENES.length+" — "+SCENES[i].name;
}

function update(){
  if(t>=TOTAL){t=TOTAL; pause(); }
  let i=SCENES.length-1;
  for(let k=0;k<SCENES.length;k++){ if(t<SCENES[k].start+SCENES[k].dur){i=k;break;} }
  activateScene(i,false);
  const st=t-SCENES[i].start;
  let cap=null;
  for(const c of SCENES[i].captions){ if(st>=c[0]) cap=c[1]; }
  if(cap!==curCap){
    curCap=cap;
    if(cap===null){capText.classList.remove("show");}
    else{
      capText.classList.remove("show");
      if(exportMode){capText.innerHTML=cap;capText.classList.add("show");}
      else setTimeout(()=>{if(curCap===cap){capText.innerHTML=cap;capText.classList.add("show");}},150);
    }
  }
  fill.style.width=(t/TOTAL*100)+"%";
  bar.querySelectorAll(".mark").forEach((m,k)=>m.classList.toggle("done",SCENES[k].start<=t));
  clockTxt.textContent=fmt(t)+" / "+fmt(TOTAL);
}

function loop(ts){
  if(!playing) return;
  t=voiceover.currentTime;
  last=ts; update();
  if(playing) raf=requestAnimationFrame(loop);
}
function play(){
  if(t>=TOTAL) t=0, curScene=-1;
  playing=true; last=null; stage.classList.remove("paused");
  playBtn.textContent="❚❚ Pause";
  if(curScene===-1) activateScene(0,true);
  voiceover.currentTime=t;
  const started=voiceover.play();
  if(started?.catch) started.catch(()=>pause());
  raf=requestAnimationFrame(loop);
}
function pause(){
  playing=false; if(raf) cancelAnimationFrame(raf);
  voiceover.pause();
  stage.classList.add("paused"); playBtn.textContent="▶ Play";
}
function seek(x){
  t=Math.max(0,Math.min(TOTAL-0.01,x));
  let i=SCENES.length-1;
  for(let k=0;k<SCENES.length;k++){ if(t<SCENES[k].start+SCENES[k].dur){i=k;break;} }
  const wasPlaying=playing;
  activateScene(i,true); voiceover.currentTime=t; update();
  if(wasPlaying) play(); else pause();
}
playBtn.addEventListener("click",()=>playing?pause():play());
document.getElementById("restartBtn").addEventListener("click",()=>{pause();seek(0);});
bar.addEventListener("click",e=>{
  const r=bar.getBoundingClientRect(); seek((e.clientX-r.left)/r.width*TOTAL);
});
document.addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();playing?pause():play();}
  if(e.code==="ArrowRight"){const i=Math.min(curScene+1,SCENES.length-1);seek(SCENES[i].start);}
  if(e.code==="ArrowLeft"){const i=Math.max(curScene-1,0);seek(SCENES[i].start);}
});

voiceover.addEventListener("ended",()=>{t=TOTAL;update();pause();});

/* Deterministic still-frame hook used by the movie renderer. */
window.renderAt=function(x){
  pause(); t=Math.max(0,Math.min(TOTAL-0.001,Number(x)||0));
  let i=SCENES.length-1;
  for(let k=0;k<SCENES.length;k++){if(t<SCENES[k].start+SCENES[k].dur){i=k;break;}}
  activateScene(i,true); update();
  const elapsed=(t-SCENES[i].start)*1000;
  document.getElementById("sc_"+SCENES[i].id).getAnimations({subtree:true}).forEach(a=>{a.pause();a.currentTime=elapsed;});
  return {time:t,scene:SCENES[i].name,total:TOTAL};
};

/* initial state */
activateScene(0,true); update(); pause(); t=0;
if(exportMode) requestAnimationFrame(()=>window.renderAt(params.get("t")||0));
</script>
</body>
