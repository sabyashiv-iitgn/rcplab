  authors: Jean-Paul Noel*, Sabyasachi Shivkumar*, Kalpana Dokka*, Ralf M. Haefner†, and Dora E. Angelaki†
  year: 2022
  summary: People with Autism Spectrum Disorder showed a stronger implicit tendency to combine auditory and visual cues but reduced explicit common-cause reports, consistent with a compensatory choice bias.
