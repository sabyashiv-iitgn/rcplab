- title: Hierarchical motion perception as causal inference
  authors: Sabyasachi Shivkumar, Gregory C. DeAngelis, and Ralf M. Haefner
  year: 2025
  summary: A hierarchical Bayesian model, constrained by human psychophysics, explains motion integration and segmentation through causal inference over latent reference frames and offers a normative account of key Gestalt principles.
  link: https://doi.org/10.1038/s41467-025-58797-0
  link_label: Read the paper ↗
  tags: [perception, context, resource, theory, behavior]

